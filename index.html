<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 앱처럼 화면이 제멋대로 확대/축소되지 않게 고정해 주는 아주 중요한 마법의 주문입니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 술게임</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <!-- 전체 화면을 감싸는 가장 큰 박스 -->
    <div id="game-container">
        
        <!-- 상단 타이틀 -->
        <h1>🍻 오늘의 술게임 🍻</h1>

        <div id="button-group">
            <button class="mode-button" id="small-group">
                👥 2~3인 소수정예<br>
                <span>도란도란 두뇌/눈치 게임</span>
            </button>

            <button class="mode-button" id="large-group">
                🔥 4인 이상 텐션업<br>
                <span>시끌벅적 순발력/단체 게임</span>
            </button>
        </div>

        <div id="game-screen" style="display: none;">
            
            <div id="card-area">
                <p id="result-text">어떤 게임이 나올까요?<br>아래 버튼을 눌러주세요!</p>
            </div>
            
            <button id="draw-button">운명의 뽑기 🎲</button>
            
            <div style="margin-top: 30px;">
                <span id="back-button" style="color: #888; text-decoration: underline; cursor: pointer;">처음으로 돌아가기</span>
            </div>

        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
