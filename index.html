<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 술게임</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="setup-screen">
            <h1>🍻 오늘의 술게임 🍻</h1>
            
            <div class="input-card">
                <p>지금 몇 명이서 마시고 있나요?</p>
                <div class="input-row">
                    <input type="number" id="player-count" min="2" max="20" placeholder="2">
                    <span>명</span>
                </div>
                <button id="start-btn">게임 추천받기 🚀</button>
            </div>
        </div>

        <div id="game-screen" style="display: none;">
            <div id="back-button">🔙 인원 다시 설정</div>
            <div id="card-area">
                <p id="result-text">어떤 게임이 나올까요?<br>아래 버튼을 눌러주세요!</p>
            </div>
            <button id="draw-button">운명의 뽑기 🎲</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
