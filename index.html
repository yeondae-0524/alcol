<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일 앱처럼 화면이 제멋대로 확대/축소되지 않게 고정해 주는 아주 중요한 마법의 주문입니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘의 술게임</title>
</head>
<body>
    <!-- 전체 화면을 감싸는 가장 큰 박스 -->
    <div id="game-container">
        
        <!-- 상단 타이틀 -->
        <h1>🍻 랜덤 복불복 🍻</h1>
        
        <!-- 게임 결과가 나올 카드 영역 -->
        <div id="card-area">
            <p id="result-text">아직 아무것도 없습니다.<br>버튼을 눌러주세요!</p>
        </div>

        <!-- 조작 버튼 -->
        <button id="start-button">운명의 뽑기</button>
        
    </div>
</body>
</html>
